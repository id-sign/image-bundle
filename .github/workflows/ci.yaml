name: CI

on:
  pull_request: ~
  push:
    branches: [main]

jobs:
  cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: composer install --no-progress
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: imagick
      - run: composer install --no-progress
      - run: vendor/bin/phpstan analyse

  tests:
    name: PHPUnit (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            symfony: '7.4.*'
          - php: '8.3'
            symfony: '7.4.*'
          - php: '8.4'
            symfony: '7.4.*'
          - php: '8.4'
            symfony: '8.0.*'
          - php: '8.5'
            symfony: '7.4.*'
          - php: '8.5'
            symfony: '8.0.*'
    steps:
      - uses: actions/checkout@v6

      # ubuntu-24.04 ships libheif with AVIF decode only — AV1 encoder lives in a
      # separate plugin package. See actions/runner-images#13728 for the upstream
      # decision not to include it in the base image.
      - name: Install AVIF encoder plugin
        run: sudo apt-get install -y libheif-plugin-aomenc

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: imagick
      - run: composer config extra.symfony.require "${{ matrix.symfony }}"
      - run: composer install --no-progress
      - run: vendor/bin/phpunit